<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>

    <script>
        function validateForm() {

            let name = document.forms["regForm"]["name"].value;
            let email = document.forms["regForm"]["email"].value;
            let password = document.forms["regForm"]["password"].value;
            let confirmPassword = document.forms["regForm"]["confirm_password"].value;
            let terms = document.forms["regForm"]["terms"].checked;

            if (name == "" || email == "" || password == "" || confirmPassword == "") {
                alert("All fields are required!");
                return false;
            }

            if (password !== confirmPassword) {
                alert("Passwords do not match!");
                return false;
            }

            if (!terms) {
                alert("You must accept the Terms of Service!");
                return false;
            }

            return true;
        }
    </script>

</head>
<body>

<h2>Register Here</h2>

<form name="regForm" action="successfulregister.php" method="post" onsubmit="return validateForm()">

    Name:
    <input type="text" name="name"><br><br>

    Email:
    <input type="text" name="email"><br><br>

    Password:
    <input type="password" name="password"><br><br>

    Confirm Password:
    <input type="password" name="confirm_password"><br><br>

    <input type="checkbox" name="terms">
    I accept the Terms of Use and Services<br><br>

    <input type="submit" value="Register">

</form>

<br>
<a href="login.html">Sign In</a>

</body>
</html>
